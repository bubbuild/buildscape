# Landscape2 guide
#
# Bub ecosystem guide.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/guide.yml

categories:
  - category: "Projects"
    content: |
      Projects are the repositories and product surfaces that define the Bub ecosystem itself. They are maintained in the open, keep the runtime small, and bias toward tape-backed context, explicit hooks, and auditability.

    subcategories:
      - subcategory: "Core Runtime"
        content: |
          These are the primary runtime building blocks. `Bub` is the hook-first runtime for shared human and agent work. `Republic` is the tape-first client/runtime layer that captures prompts, tools, outputs, and usage as structured records.

      - subcategory: "Ecosystem Infrastructure"
        content: |
          Ecosystem repositories package shared extensions and adjacent tooling. `bub-contrib` is the primary home for plugins that are maintained under the Bub umbrella.

  - category: "Websites"
    content: |
      Websites are the public-facing entry points for the ecosystem: product pages, docs hubs, and conceptual references.

    subcategories:
      - subcategory: "Product & Reference"
        content: |
          `bub.build` is the main landing page and documentation hub. `tape.systems` captures the tape model and its extensions. `getrepublic.org` is the documentation home for Republic.

  - category: "Plugins"
    content: |
      Plugins are the Bub-hosted plugin packages maintained under the Bub umbrella. This section should include the full official plugin surface: packages from `bub-contrib` plus standalone Bub plugin repositories such as `bub-xiaoai` and `bub-folotoy`.

    subcategories:
      - subcategory: "Channels"
        content: |
          Channel plugins connect Bub to external messaging systems and inbound event sources.

      - subcategory: "Runtime & Workflow"
        content: |
          Runtime and workflow plugins affect model execution, prompt construction, or execution flow around turns.

      - subcategory: "Tools"
        content: |
          Tool plugins add operator-facing capabilities such as scheduling and search.

      - subcategory: "Storage"
        content: |
          Storage plugins define where conversation history or tape data is persisted.

  - category: "Built-in Skills"
    content: |
      Built-in skills are the skills that ship with Bub itself and should appear on the official first page together with Bub's other official surfaces.

    subcategories:
      - subcategory: "Core Operations"
        content: |
          This section highlights the official Bub-bundled starter set: repository operations, Telegram delivery, and skill authoring.

  - category: "Selected Skills"
    content: |
      Selected skills are a lightweight curated list of remote skills that complement the Bub ecosystem but are not bundled with Bub itself. This landscape points at the upstream reading and installation surfaces; it does not mirror or maintain the skill content here.

    subcategories:
      - subcategory: "Python Craft"
        content: |
          `friendly-python` and `piglet` come from PsiACE's remote skill library, published through `skills.sh`, `skills.psiace.me`, and the `psiace/skills` GitHub repository.
      - subcategory: "Board Viewers"
        content: |
          `chess-board` is a small remote skill and static viewer from `frostming/chess-board`, combining a FEN-like encoding spec with generated chess and xiangqi board pages.

  - category: "Friends"
    content: |
      Friends are adjacent projects that share some of the same values or fit naturally into the wider workflow, without being part of the Bub-hosted core.

    subcategories:
      - subcategory: "Adjacent Projects"
        content: |
          `any-llm` is included as an example of a nearby project that solves a complementary problem: unified access to many model providers plus an optional governance gateway.

  - category: "Distributions"
    content: |
      Distributions package Bub for a particular deployment environment, operator workflow, or product shape.

    subcategories:
      - subcategory: "Downstream Platforms"
        content: |
          `bubseek` is a downstream distribution, not an official Bub project. It keeps the Bub runtime and extension surface while bundling opinionated defaults, channels, and platform integrations for a different operating context. Downstream-specific plugins such as `bubseek-schedule` and `bubseek-marimo` are referenced from the distribution entry instead of appearing as first-class extensions.
