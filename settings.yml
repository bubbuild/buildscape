# Landscape2 settings
#
# Bub ecosystem landscape settings.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/settings.yml

foundation: Bub

url: http://127.0.0.1:8000

colors:
  color1: "rgba(98, 196, 255, 1)"
  color2: "rgba(26, 149, 224, 1)"
  color3: "rgba(163, 171, 186, 1)"
  color4: "rgba(34, 34, 37, 1)"
  color5: "rgba(63, 63, 68, 0.92)"
  color6: "rgba(34, 34, 37, 0.86)"
  color7: "rgba(232, 233, 237, 1)"

description: A landscape for Bub projects, websites, plugins, skills, adjacent projects, and downstream platforms.

featured_items:
  - field: subcategory
    options:
      - value: Core Runtime
        order: 1
      - value: Ecosystem Infrastructure
        order: 2
      - value: Product & Reference
        order: 3
      - value: Channels
        order: 4
      - value: Runtime & Workflow
        order: 5
      - value: Tools
        order: 6
      - value: Storage
        order: 7
      - value: Core Operations
        order: 8
      - value: Python Craft
        order: 9
      - value: Adjacent Projects
        order: 10
      - value: Downstream Platforms
        order: 11
      - value: Board Viewers
        order: 12

footer:
  links:
    github: "https://github.com/bubbuild"
    homepage: "https://bub.build"
    twitter: "https://x.com/bubdotbuild"
  logo: "logos/bub-light.png"
  text: |
    Bub ecosystem landscape aligned with the official Bub brand surface.

grid_items_size: small

groups:
  - name: Official
    alias: official
    categories:
      - Projects
      - Websites
      - Built-in Skills
  - name: Extensions
    alias: extensions
    categories:
      - Plugins
      - Selected Skills
  - name: Friends & Downstream
    alias: network
    categories:
      - Friends
      - Distributions

header:
  links:
    github: "https://github.com/bubbuild/bub"
  logo: "logos/bub-light.png"
  motd: |
    "A common shape for agents that live alongside people."

hide_organization_section_in_projects: true

screenshot_width: 1600

view_mode: grid
