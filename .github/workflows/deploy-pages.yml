name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install landscape2
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/cncf/landscape2/releases/download/v1.1.0/landscape2-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Resolve deployment domain
        run: |
          pages_cname="$(tr -d '\r\n' < CNAME)"
          if [ -z "$pages_cname" ]; then
            echo "CNAME must not be empty" >&2
            exit 1
          fi

          printf 'PAGES_CNAME=%s\n' "$pages_cname" >> "$GITHUB_ENV"
          printf 'LANDSCAPE_SITE_URL=https://%s\n' "$pages_cname" >> "$GITHUB_ENV"

      - name: Prepare deployment settings
        run: |
          awk -v url="$LANDSCAPE_SITE_URL" '
            BEGIN { replaced = 0 }
            /^url: / && !replaced {
              print "url: \"" url "\""
              replaced = 1
              next
            }
            { print }
          ' settings.yml > settings.deploy.yml

      - name: Validate sources
        run: |
          landscape2 validate data --data-file data.yml
          landscape2 validate settings --settings-file settings.deploy.yml
          landscape2 validate guide --guide-file guide.yml
          landscape2 validate games --games-file games.yml

      - name: Build site
        run: |
          landscape2 build \
            --data-file data.yml \
            --settings-file settings.deploy.yml \
            --guide-file guide.yml \
            --games-file games.yml \
            --logos-path logos \
            --output-dir build

          bash ./scripts/postbuild.sh

      - name: Write Pages CNAME
        run: |
          cp CNAME build/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
