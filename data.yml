# Landscape2 data
#
# Bub ecosystem landscape.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/data.yml

categories:
  - name: Projects
    subcategories:
      - name: Core Runtime
        items:
          - name: Bub
            homepage_url: https://bub.build
            logo: bub.svg
            description: Hook-first agent runtime for people and agents working in the same conversations.
            repo_url: https://github.com/bubbuild/bub
            license: Apache-2.0
            extra:
              documentation_url: https://bub.build
              blog_url: https://bub.build/posts/
              annotations:
                "bubbuild.io/hosted": "true"
                "bubbuild.io/kind": "project"
          - name: Republic
            homepage_url: https://getrepublic.org
            logo: republic.svg
            description: Tape-first LLM client that records prompts, tools, results, and usage by default.
            repo_url: https://github.com/bubbuild/republic
            license: Apache-2.0
            extra:
              documentation_url: https://getrepublic.org
              annotations:
                "bubbuild.io/hosted": "true"
                "bubbuild.io/kind": "project"
      - name: Ecosystem Infrastructure
        items:
          - name: bub-contrib
            homepage_url: https://github.com/bubbuild/bub-contrib
            logo: bub-contrib.svg
            description: Shared repository for Bub plugins, contrib packages, and ecosystem tooling.
            repo_url: https://github.com/bubbuild/bub-contrib
            extra:
              documentation_url: https://github.com/bubbuild/bub-contrib
              annotations:
                "bubbuild.io/hosted": "true"
                "bubbuild.io/kind": "ecosystem-repo"

